name: Bump Version
run-name: bump version and update changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Run bump-version action
        uses: ./.github/actions/bump-version
        with:
          node-version: "20"
          enable-bump: "true"
          enable-changelog: "true"
          bump-type: "patch"

      - name: GitHub Summary
        run: |
          echo "### 📦 Version bumped to $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Changelog updated for $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
