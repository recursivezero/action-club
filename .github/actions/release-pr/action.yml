name: "Check and Create PR"
description: "Safely creates a Release PR"

inputs:
  github_token:
    description: "GitHub Token"
    required: true

# Explicitly defining outputs is required for cross-step logic in composite actions
outputs:
  pr_url:
    description: "The URL of the existing or new PR"
    value: ${{ steps.check.outputs.url || steps.create.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Verify PR Status
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Use --json and --jq for robust parsing
        PR_URL=$(gh pr list --head main --base release --state open --json url --jq '.[0].url // empty')

        if [ -n "$PR_URL" ]; then
          echo "PR already exists: $PR_URL"
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "url=$PR_URL" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Create PR
      if: steps.check.outputs.skip == 'false'
      id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Added --fill to automatically pull in commit history/metadata if needed
        NEW_URL=$(gh pr create \
          --head main \
          --base release \
          --title "🚀 Release: $(date +'%Y-%m-%d')" \
          --body "Automated sync from main to release.")
        echo "url=$NEW_URL" >> $GITHUB_OUTPUT

    - name: Generate Step Summary
      shell: bash
      run: |
        echo "## 🚀 Release PR Summary" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.check.outputs.skip }}" == "true" ]; then
          echo "✅ **Status:** PR Already Exists" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Link:** ${{ steps.check.outputs.url }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "✨ **Status:** New PR Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Link:** ${{ steps.create.outputs.url }}" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "_Automated by recursivezero App Deployer_" >> $GITHUB_STEP_SUMMARY
